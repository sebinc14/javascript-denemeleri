<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dikdörtgenin alanı ve çevresi</title>
</head>
<body>
    <script>
//değişkenleri tanımla
var g, y, alan, cevre

//değerleri okuyalım
g=Number(prompt("Dikdörtgenin genişliğini giriniz:"));
y=Number(prompt("Dikdörtgenin yüksekliğini giriniz:"));

//dikdörtgen alanı ve çevresi hesabı
alan=g*y;
cevre=2*(g+y);

//işlem sonucunu ekrana yazdır
alert("Dikdörtgenin alan hesabı: "+alan); 
alert("Dikdörtgenin cevre hesabı: "+cevre );
    </script>
</body>
</html>
