<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Büyük sayıyı bulma</title>
</head>
<body>
    <script>
var x, y;

x=Number(prompt("Birinci sayıyı giriniz:"));

y=Number(prompt("İkinci sayıyı giriniz:"));

if(x<y)
{alert("İkinci sayı büyük");}
else
{alert("Birinci sayı büyük");}

    </script>
</body>
</html>
