<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dairenin alanı ve çevresi</title>
</head>
<body>
    <script>
//değişkenleri tanımla
var r, alan, cevre, p=3.14;

//yarıçapı alalım
r=Number(prompt("yarıcap:"));

//alan ve cevrenin hesabı
alan=p*r*r;
cevre=2*p*r;

//işlem sonucunu ekrana yazdır 
alert("dairenin alanı: "+alan);
alert("dairenin cevresi: "+cevre);

    </script>
</body>
</html>
