<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geçti Kaldı Programı</title>
</head>
<body>
    <script>
var N1, N2, Ort;

N1=Number(prompt("N1:"));

N2=Number(prompt("N2:"));

Ort=(N1+N2)/2;

if(Ort<50)
{alert("Ortalama:"+Ort+"ile kaldı.");}

else
{alert("Ortalama:"+Ort+"ile geçti.");}

    </script>
</body>
</html>
