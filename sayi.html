<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pozitif sayının karesini bulma</title>
</head>
<body>
    <script>
var sayi, kare;
sayi=Number(prompt("sayi:"));

if(sayi<0)
{alert("sayi negatif");}
else
{kare=sayi*sayi;
    alert("kare:"+kare);
}



    </script>
</body>
</html>
