<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaşa göre durum bildirme</title>
</head>
<body>
    <script>
var yas;
yas=Number(prompt("Yaşınız:"));

if(yas<2)
{document.write("Bebek");}

else if(yas<12)
{document.write("Çocuk");}

else if(yas<42)
{document.write("Genç");}

else if(yas<62)
{document.write("Yetişkin");}

else
{document.write("Yaşlı");}


    </script>
</body>
</html>
